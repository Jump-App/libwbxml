name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write
  pull-requests: write

jobs:
  release-linux:
    name: Release linux
    runs-on: ubuntu-latest

    env:
      MIX_ENV: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Elixir and Erlang
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Install system dependecies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential automake autoconf pkg-config bc m4 unzip zip \
            libexpat1-dev

      - name: Install dependencies
        run: mix deps.get

      - name: Create precompiled library
        run: |
          export ELIXIR_MAKE_CACHE_DIR=$(pwd)/cache
          mkdir -p "${ELIXIR_MAKE_CACHE_DIR}"
          mix elixir_make.precompile

      - name: Publish release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: cache/*.tar.gz

  release-macos:
    name: Release macos
    runs-on: macos-latest

    env:
      MIX_ENV: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Elixir and Erlang
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Install dependencies
        run: mix deps.get

      - name: Create precompiled library
        run: |
          export ELIXIR_MAKE_CACHE_DIR=$(pwd)/cache
          mkdir -p "${ELIXIR_MAKE_CACHE_DIR}"
          mix elixir_make.precompile

      - name: Publish release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: cache/*.tar.gz

  checksum:
    name: Generate checksum PR
    runs-on: ubuntu-latest
    needs:
      - release-linux
      - release-macos

    env:
      MIX_ENV: prod

    steps:
      - name: Checkout tagged release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Set up Elixir and Erlang
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Install dependencies
        run: mix deps.get

      - name: Generate checksum file
        run: mix elixir_make.checksum --all --print --ignore-unavailable

      - name: Create checksum pull request
        id: checksum_pr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          branch: release/checksum-${{ github.ref_name }}
          base: main
          commit-message: Add checksum.exs for ${{ github.ref_name }}
          title: Add checksum.exs for ${{ github.ref_name }}
          body: |
            Generated `checksum.exs` for `${{ github.ref_name }}` after publishing precompiled release artifacts.
          add-paths: |
            checksum.exs

      - name: Report checksum branch status
        if: always()
        run: |
          branch="release/checksum-${GITHUB_REF_NAME}"
          pr_url="https://github.com/${GITHUB_REPOSITORY}/pull/new/${branch}"

          if [ "${{ steps.checksum_pr.outcome }}" = "success" ] && [ "${{ steps.checksum_pr.outputs.pull-request-operation }}" = "none" ]; then
            echo "No checksum.exs changes detected relative to main; skipping branch update."
            {
              echo "## Checksum branch"
              echo
              echo 'No `checksum.exs` changes were detected relative to `main`.'
              echo
              printf 'No branch update or pull request is needed for `%s`.\n' "${GITHUB_REF_NAME}"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          echo "Checksum branch is ready: ${branch}"
          echo "Create the PR manually: ${pr_url}"

          if [ "${{ steps.checksum_pr.outcome }}" != "success" ]; then
            echo "Create checksum pull request step did not complete successfully; continuing after branch creation attempt."
          fi

          {
            echo "## Checksum branch"
            echo
            printf 'A checksum branch is available for `%s`.\n' "${GITHUB_REF_NAME}"
            echo
            printf -- '- Branch: `%s`\n' "${branch}"
            echo "- Open PR: ${pr_url}"
          } >> "${GITHUB_STEP_SUMMARY}"
